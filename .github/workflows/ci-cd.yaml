# ------------------------------------------------------------
# Nom du workflow CI/CD
# ------------------------------------------------------------
name: CI/CD k3s + Docker Hub

# ------------------------------------------------------------
# Déclencheur du pipeline
# Ici : à chaque "push" sur les branches dev, qa ou main
# ------------------------------------------------------------
on:
  push:
    branches: [ "dev", "qa", "main" ]

# ------------------------------------------------------------
# Variables d'environnement globales
# REGISTRY : registre Docker utilisé
# IMAGE_NAME : nom complet de l'image Docker (username + nom de l'app)
# ------------------------------------------------------------
env:
  REGISTRY: docker.io
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/hello-app

jobs:
  build-and-deploy:
    # ------------------------------------------------------------
    # Le job s'exécute sur une machine Ubuntu fournie par GitHub
    # ------------------------------------------------------------
    runs-on: self-hosted

    # Permissions minimales nécessaires pour lire le dépôt
    permissions:
      contents: read

    steps:
      # ------------------------------------------------------------
      # Étape 1 : Récupérer le code du dépôt
      # ------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------
      # Étape 2 : Préparer Docker Buildx
      # Buildx permet de construire des images Docker modernes
      # ------------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true
        env:
          BUILDX_NO_DEFAULT_ATTESTATIONS: 1 
      # ------------------------------------------------------------
      # Étape 3 : Connexion à Docker Hub
      # On utilise les secrets configurés dans GitHub
      # ------------------------------------------------------------
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ------------------------------------------------------------
      # Étape 4 : Déterminer le tag Docker et l'environnement k8s
      # selon la branche Git :
      #   dev  -> tag dev  -> namespace dev
      #   qa   -> tag qa   -> namespace qa
      #   main -> tag prod -> namespace prod
      # ------------------------------------------------------------
      - name: Set image tag based on branch
        id: vars
        run: |
          if [ "${GITHUB_REF_NAME}" = "dev" ]; then
            echo "TAG=dev" >> $GITHUB_OUTPUT
            echo "K8S_ENV=dev" >> $GITHUB_OUTPUT
          elif [ "${GITHUB_REF_NAME}" = "qa" ]; then
            echo "TAG=qa" >> $GITHUB_OUTPUT
            echo "K8S_ENV=qa" >> $GITHUB_OUTPUT
          else
            echo "TAG=prod" >> $GITHUB_OUTPUT
            echo "K8S_ENV=prod" >> $GITHUB_OUTPUT
          fi

      # ------------------------------------------------------------
      # Étape 5 : Construire et pousser l'image Docker
      # - context: .  → construit à partir du projet
      # - push: true → pousse l'image sur Docker Hub
      # - tags:      → nom complet de l'image + tag (dev/qa/prod)
      # ------------------------------------------------------------
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.TAG }}

      # ------------------------------------------------------------
      # Étape 6 : Installer kubectl
      # kubectl est nécessaire pour déployer dans k3s
      # ------------------------------------------------------------
      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl

      # ------------------------------------------------------------
      # Étape 7 : Configurer le kubeconfig
      # Le kubeconfig fourni par le professeur est stocké dans un secret
      # On le sauvegarde dans un fichier local et on le protège (chmod 600)
      # ------------------------------------------------------------
      - name: Configure kubeconfig
        run: |
          echo "${{ secrets.KUBECONFIG_CONTENT }}" > kubeconfig
          chmod 600 kubeconfig
          export KUBECONFIG=$PWD/kubeconfig
          echo "KUBECONFIG=$PWD/kubeconfig" >> $GITHUB_ENV

      # ------------------------------------------------------------
      # Étape 8 : Mettre à jour le manifest Kubernetes
      # Remplace DOCKER_HUB_USERNAME/hello-app:TAG
      # par le vrai nom d'image + tag (ex: danny/hello-app:dev)
      #
      # Cela permet d'utiliser le même fichier YAML pour tous les environnements
      # ------------------------------------------------------------
      - name: Update image in manifest
        run: |
          sed -i "s|DOCKER_HUB_USERNAME/hello-app:${{ steps.vars.outputs.TAG }}|${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.TAG }}|g" k8s/deployment-${{ steps.vars.outputs.K8S_ENV }}.yaml

      # ------------------------------------------------------------
      # Étape 9 : Déployer dans Kubernetes
      # kubectl apply met à jour ou crée les ressources
      # ------------------------------------------------------------
      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/deployment-${{ steps.vars.outputs.K8S_ENV }}.yaml -n ${{ steps.vars.outputs.K8S_ENV }}
